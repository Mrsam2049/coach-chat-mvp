<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora | Nueva contraseña</title>
  <link rel="stylesheet" href="./portal.css" />
  <meta name="sb-url"  content="https://fijzsyjvrsbevwvjdlok.supabase.co">
  <meta name="sb-anon" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpanpzeWp2cnNiZXZ3dmpkbG9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjI5MzQsImV4cCI6MjA5MDQ5ODkzNH0.ekLGNlGpL0XW3SCoBs-k3gfBb1gy6KPe21hh3u_tAOQ">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">

      <!-- Estado: cargando (mientras Supabase procesa el token de la URL) -->
      <div id="state-loading">
        <h1>Verificando enlace...</h1>
        <p class="auth-subtitle">Un momento por favor</p>
      </div>

      <!-- Estado: enlace inválido o expirado -->
      <div id="state-invalid" style="display:none">
        <h1>Enlace inválido</h1>
        <p class="auth-subtitle">Este enlace ya fue usado o ha expirado.</p>
        <div class="auth-links" style="margin-top: 28px">
          <a href="./forgot-password.html">Solicitar un nuevo enlace</a>
        </div>
      </div>

      <!-- Estado: formulario de nueva contraseña -->
      <div id="state-form" style="display:none">
        <h1>Nueva contraseña</h1>
        <p class="auth-subtitle">Elige una contraseña segura para tu cuenta</p>

        <form id="reset-form" class="auth-form">
          <label for="password">Nueva contraseña</label>
          <input type="password" id="password" minlength="8" required autocomplete="new-password"
            placeholder="Mínimo 8 caracteres" />

          <label for="password2">Confirmar contraseña</label>
          <input type="password" id="password2" minlength="8" required autocomplete="new-password"
            placeholder="Repite la contraseña" />

          <!-- Indicador visual de fuerza -->
          <div class="password-strength" id="strength-bar" aria-hidden="true">
            <div class="strength-track">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>

          <button type="submit" id="submit-btn">Guardar contraseña</button>
        </form>

        <p id="reset-message" class="auth-message"></p>
      </div>

      <!-- Estado: éxito -->
      <div id="state-success" style="display:none">
        <h1>¡Contraseña actualizada!</h1>
        <p class="auth-subtitle">Tu contraseña fue cambiada correctamente.</p>
        <div class="auth-links" style="margin-top: 28px">
          <a href="./login.html">Ir al inicio de sesión →</a>
        </div>
      </div>

    </section>
  </main>

  <script type="module" src="./reset-password.js"></script>
</body>
</html>
