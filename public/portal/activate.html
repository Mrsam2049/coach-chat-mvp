<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Activar acceso</h1>
      <p class="auth-subtitle">Solo para alumnas autorizadas</p>

      <form id="activate-form" class="auth-form">
        <label for="email">Correo</label>
        <input type="email" id="email" required />

        <label for="password">Crea tu contraseña</label>
        <input type="password" id="password" minlength="8" required />

        <label for="password2">Confirma tu contraseña</label>
        <input type="password" id="password2" minlength="8" required />

        <button type="submit">Activar cuenta</button>
      </form>

      <p id="activate-message" class="auth-message"></p>

      <div class="auth-links">
        <a href="./login.html">Volver al inicio de sesión</a>
      </div>
    </section>
  </main>

  <script type="module" src="./activate.js"></script>
