<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Recuperar acceso</h1>
      <p class="auth-subtitle">Te enviaremos un enlace para restablecer tu contraseña</p>

      <form id="forgot-form" class="auth-form">
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email" />
        <button type="submit" id="submit-btn">Enviar enlace</button>
      </form>

      <p id="forgot-message" class="auth-message"></p>

      <div class="auth-links">
        <a href="./login.html">← Volver al inicio de sesión</a>
      </div>
    </section>
