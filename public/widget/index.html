<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aurora — Asistente del Curso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-title">Aurora — Asistente del Curso</div>
        <div class="brand-subtitle" id="status"></div>
      </div>
    </header>

    <main class="chat">
      <div id="box" class="chat-box"></div>
    </main>

    <footer class="composer">
      <div class="composer-inner">
        <textarea id="input" rows="1" placeholder="Escribe tu pregunta..." autocomplete="off"></textarea>
          <button id="send" type="button" aria-label="Enviar mensaje">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M5 12L19 12M19 12L13 6M19 12L13 18"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </svg>
  </button>
      </div>
      <!-- <div class="composer-hint">
        Responde con base en el contenido del programa. No compartas datos personales.
      </div> -->
    </footer>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
